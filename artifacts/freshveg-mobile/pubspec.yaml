name: freshveg_mobile
description: FreshVeg — Fresh Grocery Delivery mobile app (iOS & Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & networking
  dio: ^5.7.0
  http: ^1.2.2

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Maps
  google_maps_flutter: ^2.9.0

  # Animations
  flutter_animate: ^4.5.0

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.20.1
  cupertino_icons: ^1.0.8
  collection: ^1.19.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
