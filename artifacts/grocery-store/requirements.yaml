packages:
  "zustand": "State management for cart, auth, and language"
  "react-leaflet": "Map components for delivery location"
  "leaflet": "Core map library"
  "@types/leaflet": "Type definitions for leaflet"
  "framer-motion": "Smooth page transitions and micro-interactions"
  "recharts": "Admin dashboard analytics charts"
  "lucide-react": "Icons for the interface"
  "date-fns": "Human-readable date formatting"

images:
  - path: "artifacts/grocery-store/public/images/hero-bg.png"
    description: "Fresh green vegetables scattered on a clean white rustic wooden table, top down view, high quality food photography, bright lighting, empty space in the middle for text"
    aspect_ratio: "16:9"
  - path: "artifacts/grocery-store/public/images/auth-bg.png"
    description: "Abstract soft green gradient background with subtle organic leaf shapes, modern and clean style"
    aspect_ratio: "16:9"

notes:
  - "Orval generated API hooks are used from @workspace/api-client-react"
  - "Zustand manages local auth token which is passed to requests"
  - "RTL support uses Tailwind logical properties"
