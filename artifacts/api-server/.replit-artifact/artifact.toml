kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["sh", "-c", "pnpm --filter @workspace/grocery-store run build && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push && pnpm --filter @workspace/scripts run seed"]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "8080"
NODE_ENV = "production"
