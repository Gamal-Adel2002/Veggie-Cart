name: Build & Release Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/freshveg-mobile/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.32.0', channel: stable, cache: true }
      - run: flutter pub get
        working-directory: artifacts/freshveg-mobile
      - run: flutter build apk --debug
        working-directory: artifacts/freshveg-mobile
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: FreshVeg Android APK (latest)
          prerelease: true
          files: artifacts/freshveg-mobile/build/app/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
