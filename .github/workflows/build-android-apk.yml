name: Build Android APK

on:
  push:
    paths:
      - 'artifacts/freshveg-mobile/**'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL (e.g. https://your-app.replit.app)'
        required: false
        default: 'https://your-app.replit.app'

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: artifacts/freshveg-mobile
        run: flutter pub get

      - name: Build debug APK
        working-directory: artifacts/freshveg-mobile
        run: |
          API_URL="${{ github.event.inputs.api_url || 'https://your-app.replit.app' }}"
          flutter build apk --debug \
            --dart-define=FLUTTER_API_BASE_URL="$API_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: freshveg-debug-apk
          path: artifacts/freshveg-mobile/build/app/outputs/apk/debug/app-debug.apk
          retention-days: 7
